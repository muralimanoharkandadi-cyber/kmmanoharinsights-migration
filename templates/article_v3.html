<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{TITLE}}</title>

<meta name="description" content="{{DESCRIPTION}}">
<meta name="author" content="{{AUTHOR}}">
<meta name="robots" content="index,follow,max-image-preview:large">

<link rel="canonical" href="{{CANONICAL}}">

<meta property="og:type" content="article">
<meta property="og:title" content="{{TITLE}}">
<meta property="og:description" content="{{DESCRIPTION}}">
<meta property="og:url" content="{{CANONICAL}}">
<meta property="og:site_name" content="KM Manohar Insights">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{TITLE}}">
<meta name="twitter:description" content="{{DESCRIPTION}}">

<meta name="theme-color" content="#1e73be">

<link rel="stylesheet" href="/assets/css/article_v3.css">

</head>

<body>

<div class="container">

<header class="article-header">

<div class="site-name">
<a href="/">KM Manohar Insights</a>
</div>

<h1>{{TITLE}}</h1>

<p class="article-summary">
{{DESCRIPTION}}
</p>

<div class="article-meta">
<span>📅 {{DATE}}</span>
<span>•</span>
<span>⏱ {{READING_TIME}} min read</span>
<span>•</span>
<span>📝 {{WORD_COUNT}} words</span>
</div>

<div class="meta">
By <strong>{{AUTHOR}}</strong>
</div>

{{HERO}}

</header>

<div class="page-layout">

<aside class="toc-sidebar">

<div class="toc-card">

<h3>Contents</h3>

<nav id="table-of-contents">
<!-- Generated by article_v3.js -->
</nav>

</div>

</aside>

<main class="article-content">

{{CONTENT}}

{{NAVIGATION}}

{{RELATED}}

</main>

</div>

<footer>
<p>© KM Manohar Insights</p>
</footer>

</div>

<script src="/assets/js/article_v3.js"></script>

</body>

</html>
